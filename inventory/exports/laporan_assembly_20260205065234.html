<!DOCTYPE html>
<html>
<head>

    <title>Laporan Assembly</title>
    <style>
        @media print {
            @page { size: A4 landscape; margin: 1cm; }
            .no-print { display: none; }
        }
        body { font-family: Arial; margin: 20px; font-size: 11px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #333; padding-bottom: 10px; }
        .header h1 { margin: 5px 0; font-size: 20px; }
        .summary-box { display: inline-block; padding: 15px; margin: 10px; border: 2px solid; border-radius: 5px; text-align: center; }
        .masuk { background: #e8f5e9; border-color: #4caf50; }
        .keluar { background: #ffebee; border-color: #f44336; }
        .number { font-size: 28px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #4682B4; color: white; padding: 10px; border: 1px solid #ccc; }
        td { padding: 8px; border: 1px solid #ddd; }
        tr:nth-child(even) { background: #f9f9f9; }
        .btn { position: fixed; top: 20px; right: 20px; padding: 12px 24px; background: #4682B4; color: white; border: none; border-radius: 5px; cursor: pointer; z-index: 1000; }
    </style>
</head>
